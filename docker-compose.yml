services:
  postgres:
    image: postgres:16-alpine
    container_name: support-ai-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-support_ai}
      POSTGRES_USER: ${POSTGRES_USER:-support_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-support_ai_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-support_ai} -d ${POSTGRES_DB:-support_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: support-ai-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-support_ai}
      POSTGRES_USER: ${POSTGRES_USER:-support_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-support_ai_dev}
      # Dev-only default so `docker compose up` works out of the box. Override JWT_SECRET in .env
      # for anything real — the app refuses to start with the "change-me..." placeholder.
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-please-override-with-a-32byte-random-value}
      LOCAL_STORAGE_PATH: /app/uploads
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: support-ai-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    depends_on:
      - backend

volumes:
  postgres_data:
