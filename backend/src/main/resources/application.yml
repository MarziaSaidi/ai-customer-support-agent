spring:
  application:
    name: supportiq

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/support_ai}
    username: ${POSTGRES_USER:support_ai}
    password: ${POSTGRES_PASSWORD:support_ai_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-in-production}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o-mini
    embedding-model: text-embedding-3-small
  storage:
    type: local
    local-path: ${LOCAL_STORAGE_PATH:./uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  # Documents are processed in a background thread after upload (see SyncDocumentProcessingDispatcher).
  document-processing:
    mode: ${DOCUMENT_PROCESSING_MODE:sync}
  # Per-IP throttle on the public (unauthenticated) chat widget to limit abuse/AI cost.
  rate-limit:
    widget:
      max-requests: ${WIDGET_RATE_LIMIT:30}
      window-ms: 60000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.supportai: INFO
    org.springframework.security: WARN

---
spring:
  config:
    activate:
      on-profile: docker

logging:
  level:
    com.supportai: INFO
