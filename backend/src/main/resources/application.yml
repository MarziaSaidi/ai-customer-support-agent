spring:
  application:
    name: ai-customer-support-agent

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/support_ai}
    username: ${POSTGRES_USER:support_ai}
    password: ${POSTGRES_PASSWORD:support_ai_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  rabbitmq:
    addresses: ${RABBITMQ_URL:amqp://guest:guest@localhost:5672}

  mail:
    host: smtp.sendgrid.net
    port: 587
    username: apikey
    password: ${SENDGRID_API_KEY:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-in-production}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o-mini
    embedding-model: text-embedding-3-small
  storage:
    type: local
    local-path: ${LOCAL_STORAGE_PATH:./uploads}
  email:
    from: ${EMAIL_FROM:noreply@yourcompany.com}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.supportai: INFO
    org.springframework.security: WARN

---
spring:
  config:
    activate:
      on-profile: docker

logging:
  level:
    com.supportai: INFO
