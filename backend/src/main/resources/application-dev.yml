# Run without Docker/PostgreSQL using an in-memory H2 database.
# Run: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev

spring:
  datasource:
    url: jdbc:h2:mem:supportiq;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.supportai: INFO

app:
  storage:
    local-path: ../uploads
  document-processing:
    mode: sync
